name: Build and Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark this release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build macOS DMG
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v0.1.0, got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Android platform-tools
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            -o "$RUNNER_TEMP/platform-tools.zip" \
            "https://dl.google.com/android/repository/platform-tools_r37.0.0-darwin.zip"
          unzip -q "$RUNNER_TEMP/platform-tools.zip" -d "$RUNNER_TEMP"
          "$RUNNER_TEMP/platform-tools/adb" version

      - name: Build app and DMG
        shell: bash
        env:
          ADB_SOURCE: ${{ runner.temp }}/platform-tools/adb
        run: |
          set -euo pipefail
          Scripts/package_app.sh "$PWD/ADB Pull Photos-${{ steps.version.outputs.version }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ADB Pull Photos DMG
          path: ADB Pull Photos-${{ steps.version.outputs.version }}.dmg
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        run: |
          set -euo pipefail
          DMG="ADB Pull Photos-${VERSION}.dmg"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "$DMG" --clobber
          else
            if [[ "${PRERELEASE}" == "true" ]]; then
              gh release create "$VERSION" "$DMG" \
                --title "ADB Pull Photos ${VERSION}" \
                --notes-file RELEASE_NOTES.md \
                --prerelease
            else
              gh release create "$VERSION" "$DMG" \
                --title "ADB Pull Photos ${VERSION}" \
                --notes-file RELEASE_NOTES.md
            fi
          fi

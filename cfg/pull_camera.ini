[adb]
# Run `adb devices` and paste the exact serial here to lock transfers to one phone.
# Leave empty to use the current default adb device behavior.
device_id =

[defaults]
# Shared transfer log. Relative paths are resolved from the directory containing pull_camera.py.
db = db/adb_photo_export.sqlite3

dry_run = false
fast = false
retransfer_deleted = false
force = false
record_existing = false

[job.camera]
enabled = true
remote = /sdcard/DCIM/Camera
local = ~/Pictures/m14u_resp/Camera

[job.screenshots]
enabled = true
remote = /sdcard/DCIM/Screenshots
local = ~/Pictures/m14u_resp/Screenshots

[job.facebook]
enabled = true
remote = /sdcard/DCIM/Facebook
local = ~/Pictures/m14u_resp/Facebook

[job.weixin]
enabled = true
remote = /sdcard/Pictures/WeiXin
local = ~/Pictures/m14u_resp/WeiXin

# Add more directory pairs by copying this section and changing the name.
#
# [job.screenshots]
# enabled = true
# remote = /sdcard/Pictures/Screenshots
# local = ~/Pictures/m14u-screenshots
